name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows wheel (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython setuptools wheel

      - name: Install package dependencies
        run: pip install -r requirements-build.txt

      - name: Compile with Cython
        run: python setup_cython.py build_ext --inplace

      - name: Remove source .py files (keep only .pyd)
        shell: bash
        run: |
          rm -f datialog/server.py datialog/license_manager.py
          rm -f datialog/server.c datialog/license_manager.c
          rm -rf build/

      - name: Create custom setup.py for platform wheel
        shell: bash
        run: |
          cat > setup.py << 'SETUP'
          from setuptools import setup, find_packages
          from setuptools.dist import Distribution

          class BinaryDistribution(Distribution):
              def has_ext_modules(self):
                  return True

          setup(
              name="datialog",
              version="1.3.1",
              packages=find_packages(),
              package_data={"datialog": ["*.pyd", "*.so", "static/**/*", "static/*"]},
              include_package_data=True,
              distclass=BinaryDistribution,
              entry_points={"console_scripts": ["datialog=datialog.cli:main"]},
          )
          SETUP

      - name: Build platform wheel
        run: python setup.py bdist_wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-py${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-windows-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
