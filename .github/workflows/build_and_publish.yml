name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows wheel (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel cython
          pip install -r requirements-build.txt

      - name: Copy source files from src/ for compilation
        shell: bash
        run: |
          cp src/server.py datialog/server.py
          cp src/license_manager.py datialog/license_manager.py
          echo "=== Source files ready ==="
          ls -la datialog/*.py

      - name: Compile with Cython
        run: python setup_cython.py build_ext --inplace

      - name: Verify .pyd files
        shell: bash
        run: |
          echo "=== Compiled .pyd files ==="
          ls -la datialog/*.pyd || echo "ERROR: No .pyd files found"

      - name: Remove source files (keep only .pyd)
        shell: bash
        run: |
          rm -f datialog/server.py datialog/license_manager.py
          rm -f datialog/server.c datialog/license_manager.c
          rm -rf build/

      - name: Build platform wheel
        run: python setup_wheel.py bdist_wheel

      - name: Verify wheel contents
        shell: bash
        run: |
          echo "=== Wheel contents ==="
          python -c "
          import zipfile, glob
          wheels = glob.glob('dist/*.whl')
          for w in wheels:
              print(f'Wheel: {w}')
              with zipfile.ZipFile(w) as z:
                  for f in z.namelist():
                      if 'pyd' in f or 'so' in f or 'py' in f:
                          print(f'  {f}')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-py${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-windows-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
